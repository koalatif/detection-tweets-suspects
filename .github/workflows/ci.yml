name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint (flake8, erreurs critiques uniquement)
        run: flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run unit tests
        run: pytest tests -v

      - name: Verify DVC pipeline definition
        run: |
          pip install dvc
          dvc dag || true
          test -f dvc.yaml && echo "Pipeline DVC present."
